<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>LowKeyFI Admin</title>
    <style>
      @font-face { font-family: "MSW98UI"; src: url("../fonts/MSW98UI-Bold.otf") format("opentype"); }
      * { box-sizing: border-box; }
      body { display: grid; min-height: 100vh; margin: 0; padding: 24px; place-items: center; color: #111; background: #171717; font-family: "MSW98UI", "MS Sans Serif", Tahoma, sans-serif; }
      main { width: min(620px, 100%); overflow: hidden; background: #d4d4d4; border: 4px solid; border-color: #fff #222 #222 #fff; border-radius: 8px; box-shadow: 12px 14px 35px rgba(0, 0, 0, 0.55); }
      header { padding: 12px 18px; color: #fff; background: #001d8f; font-size: 20px; }
      section { padding: 34px; }
      h1 { margin: 0 0 20px; color: #001d8f; }
      p { line-height: 1.5; }
      a { display: block; margin-top: 28px; padding: 14px 20px; color: #001d8f; text-align: center; text-decoration: none; background: #eee; border: 2px solid #001d8f; border-radius: 7px; }
      a:hover, a:focus-visible { color: #fff; background: #001d8f; }
    </style>
  </head>
  <body>
    <main>
      <header>eliz.exe — ADMIN</header>
      <section>
        <h1>Website editor</h1>
        <p>Sign in with the GitHub account that owns this website. Only repository collaborators can save changes.</p>
        <a href="https://app.pagescms.org" rel="noreferrer">Sign in with GitHub →</a>
      </section>
    </main>
  </body>
