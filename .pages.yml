media:
  input: public/images/uploads
  output: /images/uploads
  categories: [image]
  extensions: [png, jpg, jpeg, webp, gif]
  rename: safe

settings:
  content:
    merge: true
  commit:
    identity: user

content:
  - name: settings
    label: Site settings
    type: file
    path: src/content/site.json
    format: json
    fields:
      - { name: windowTitle, label: Window title, type: string, required: true }
      - name: theme
        label: Theme
        type: object
        fields:
          - name: accentColor
            label: Main blue color
            type: string
            required: true
            pattern: { regex: "^#[0-9a-fA-F]{6}$", message: "Use a hex color such as #001d8f." }
          - { name: accentColorLight, label: Lighter blue color, type: string, required: true, pattern: "^#[0-9a-fA-F]{6}$" }
          - { name: windowColor, label: Window color, type: string, required: true, pattern: "^#[0-9a-fA-F]{6}$" }
          - { name: pageBackground, label: Outside background, type: string, required: true, pattern: "^#[0-9a-fA-F]{6}$" }
          - name: cornerStyle
            label: Corner style
            type: select
            required: true
            options:
              values:
                - { name: rounded, label: Rounded }
                - { name: square, label: Classic square }

  - name: navigation
    label: Sidebar navigation
    type: file
    path: src/content/navigation.json
    format: json
    list: true
    operations: { delete: false }
    fields:
      - { name: id, label: Page ID, type: string, required: true, readonly: true }
      - { name: label, label: Sidebar label, type: string, required: true }
      - { name: icon, label: Sidebar icon, type: image, required: true }

  - name: pages
    label: Pages
    type: group
    items:
      - name: home
        label: Home
        type: file
        path: src/content/home.json
        format: json
        fields:
          - { name: heading, label: Heading, type: string, required: true }
          - { name: description, label: Introduction, type: text, required: true }
          - { name: heroImage, label: Hero image, type: image, required: true }
          - { name: heroImageAlt, label: Hero image description, type: string, required: true }
          - name: currentStatus
            label: Current status
            type: object
            list: { min: 1, max: 3, collapsible: { collapsed: true, summary: "{label} {value}" } }
            fields:
              - { name: id, label: ID, type: string, required: true }
              - { name: label, label: Label, type: string, required: true }
              - { name: value, label: Value, type: string, required: true }

      - name: about
        label: About
        type: file
        path: src/content/about.json
        format: json
        fields:
          - { name: heading, label: Heading, type: string, required: true }
          - { name: image, label: Main image, type: image, required: true }
          - { name: imageAlt, label: Image description, type: string, required: true }
          - { name: paragraphs, label: Paragraphs, type: text, list: true, required: true }

      - name: postCategories
        label: Post categories
        type: file
        path: src/content/post-categories.json
        format: json
        fields:
          - { name: heading, label: Heading, type: string, required: true }
          - { name: intro, label: Introduction, type: text, required: true }
          - name: categories
            label: Categories
            type: object
            list: { min: 1, collapsible: { collapsed: true, summary: "{title}" } }
            fields: &category_fields
              - { name: id, label: ID, type: string, required: true, pattern: "^[a-z0-9-]+$" }
              - { name: title, label: Title, type: string, required: true }
              - { name: description, label: Description, type: text, required: true }
              - { name: icon, label: Icon, type: image, required: true }

      - name: resources
        label: Resources
        type: file
        path: src/content/resources.json
        format: json
        fields:
          - { name: heading, label: Heading, type: string, required: true }
          - { name: intro, label: Introduction, type: text, required: true }
          - name: categories
            label: Categories
            type: object
            list: { min: 1, collapsible: { collapsed: true, summary: "{title}" } }
            fields: *category_fields

      - name: contact
        label: Contact
        type: file
        path: src/content/contact.json
        format: json
        fields:
          - { name: heading, label: Heading, type: string, required: true }
          - { name: intro, label: Introduction, type: string, required: true }
          - name: links
            label: Contact links
            type: object
            list: { min: 1, collapsible: { collapsed: true, summary: "{label}" } }
            fields:
              - { name: id, label: ID, type: string, required: true, pattern: "^[a-z0-9-]+$" }
              - { name: label, label: Label, type: string, required: true }
              - { name: handle, label: Display text, type: string, required: true }
              - { name: url, label: Link URL, type: string, required: true }
              - { name: icon, label: Icon, type: image, required: true }
              - { name: openInNewTab, label: Open in a new tab, type: boolean }
          - name: support
            label: Support card
            type: object
            fields:
              - { name: enabled, label: Show support card, type: boolean }
              - { name: heading, label: Heading, type: string, required: true }
              - { name: description, label: Description, type: text, required: true }
              - { name: image, label: Image, type: image, required: true }
              - { name: imageAlt, label: Image description, type: string, required: true }
              - { name: buttonLabel, label: Button label, type: string, required: true }
              - { name: url, label: Support URL, type: string, required: true }

  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: json
    filename: "{primary}.json"
    view:
      primary: title
      fields: [title, category, date, published, featured]
      sort: [date, title]
      default: { sort: date, order: desc }
    fields:
      - { name: title, label: Title, type: string, required: true }
      - name: slug
        label: URL-friendly ID
        type: string
        required: true
        description: "Lowercase letters, numbers, and hyphens only."
        pattern: { regex: "^[a-z0-9-]+$", message: "Use lowercase letters, numbers, and hyphens only." }
      - { name: published, label: Published, type: boolean }
      - { name: featured, label: Feature on homepage, type: boolean }
      - { name: date, label: Publish date, type: date, required: true }
      - name: category
        label: Category
        type: select
        required: true
        options:
          values:
            - { name: money, label: Money }
            - { name: travel, label: Travel }
            - { name: exploring, label: Exploring }
            - { name: guides, label: Guides }
      - { name: excerpt, label: Short description, type: text, required: true }
      - { name: image, label: Cover image, type: image }
      - { name: imageAlt, label: Cover image description, type: string }
      - name: coverPosition
        label: Legacy cover position
        type: select
        default: right
        options:
          values:
            - { name: right, label: Right of text }
            - { name: left, label: Left of text }
      - name: coverSize
        label: Legacy cover size
        type: select
        default: medium
        options:
          values:
            - { name: small, label: Small }
            - { name: medium, label: Medium }
            - { name: large, label: Large }
      - name: body
        label: Simple post content
        type: text
        description: "Optional. Use this for a simple article, or use Content sections below for richer layouts."
      - name: sections
        label: Content sections
        type: object
        list: { collapsible: { collapsed: true, summary: "{type}" } }
        description: "Add text and images in any order. Text + image sections can place media on either side."
        fields:
          - name: type
            label: Section type
            type: select
            required: true
            default: text
            options:
              values:
                - { name: text, label: Text only }
                - { name: text-image, label: Text + image }
                - { name: image, label: Image only }
          - { name: text, label: Paragraphs, type: text, description: "Separate paragraphs with a blank line." }
          - { name: image, label: Image, type: image }
          - { name: imageAlt, label: Image description, type: string }
          - { name: caption, label: Image caption, type: string }
          - name: imagePosition
            label: Image position
            type: select
            default: right
            options:
              values:
                - { name: right, label: Right of text }
                - { name: left, label: Left of text }
          - name: size
            label: Image size
            type: select
            default: medium
            options:
              values:
                - { name: small, label: Small }
                - { name: medium, label: Medium }
                - { name: large, label: Large }

  - name: resourcePosts
    label: Recommendations
    type: collection
    path: src/content/resource-posts
    format: json
    filename: "{primary}.json"
    view:
      primary: title
      fields: [title, category, published]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: URL-friendly ID, type: string, required: true, pattern: "^[a-z0-9-]+$" }
      - { name: published, label: Published, type: boolean }
      - name: category
        label: Category
        type: select
        required: true
        options:
          values:
            - { name: books, label: Books }
            - { name: tools, label: Tools / Apps }
            - { name: equipment, label: Equipment }
            - { name: other, label: Other Recommendations }
      - { name: image, label: Main image, type: image }
      - { name: imageAlt, label: Image description, type: string }
      - { name: url, label: Recommendation link, type: string }
      - { name: body, label: Page content, type: text, required: true, description: "Separate paragraphs with a blank line." }
